<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GermanKeiv Network V9</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= BACKGROUND ================= */
body{
margin:0;
font-family:Orbitron;
color:white;
overflow-x:hidden;
background:radial-gradient(circle at 20% 20%,#00ffd5,transparent 40%),
radial-gradient(circle at 80% 30%,#ff00cc,transparent 40%),
radial-gradient(circle at 50% 80%,#7a00ff,transparent 40%),
linear-gradient(120deg,#000,#0a001a);
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* GRID */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);
background-size:50px 50px;
z-index:-1;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:10px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:999;
}

nav a{
color:#00ffd5;
text-decoration:none;
font-size:13px;
}

/* SECTIONS */
section{
padding:90px 10%;
text-align:center;
}

h2{color:#00ffd5}

/* CARDS */
.card{
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
margin:10px;
display:inline-block;
}

/* BUTTONS */
button{
padding:10px 20px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ffd5,#ff00cc);
cursor:pointer;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#220044);
z-index:9999;
flex-direction:column;
}

/* STORE */
.store-item{
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
margin:10px;
display:inline-block;
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
<h1>🔐 Login</h1>
<input id="user" placeholder="Username" style="padding:10px;">
<br><br>
<button onclick="login()">Enter Server</button>
</div>

<!-- NAV -->
<nav>
<a href="#home">Home</a>
<a href="#store">Store</a>
<a href="#vote">Vote</a>
<a href="#profile">Profile</a>
<a href="#arcade">Arcade</a>
</nav>

<!-- HOME -->
<section id="home">
<h1>GermanKeiv Network</h1>
<p>Welcome <span id="pname"></span></p>
</section>

<!-- PROFILE -->
<section id="profile">
<h2>Profile</h2>
<div class="card">
Name: <span id="nameOut"></span><br>
Coins: <span id="coins">0</span>
</div>
</section>

<!-- STORE -->
<section id="store">
<h2>Store 🛒</h2>

<div class="store-item">
Rank VIP - 100 coins<br>
<button onclick="buy(100,'VIP')">Buy</button>
</div>

<div class="store-item">
Sword Skin - 50 coins<br>
<button onclick="buy(50,'Sword Skin')">Buy</button>
</div>

<div class="store-item">
Pet Wolf - 150 coins<br>
<button onclick="buy(150,'Wolf')">Buy</button>
</div>

</section>

<!-- VOTE -->
<section id="vote">
<h2>Vote 🗳</h2>

<p>Vote for the server and get coins</p>
<button onclick="vote()">Vote Now</button>
</section>

<!-- ARCADE -->
<section id="arcade">
<h2>Arcade 🎮</h2>
<button onclick="mine()">Mine (+coins)</button>
<h3>Score: <span id="score">0</span></h3>
</section>

<script>

/* ================= LOGIN ================= */
let user="";
let coins=0;
let score=0;

function login(){
user=document.getElementById("user").value||"Player";

document.getElementById("login").style.display="none";

document.getElementById("pname").innerText=user;
document.getElementById("nameOut").innerText=user;

load();
}

function load(){
coins=localStorage.getItem(user+"_coins")||0;
document.getElementById("coins").innerText=coins;
}

/* ================= STORE ================= */
function buy(price,item){
if(coins>=price){
coins-=price;
alert("Purchased "+item);
save();
}else{
alert("Not enough coins");
}
}

function save(){
localStorage.setItem(user+"_coins",coins);
document.getElementById("coins").innerText=coins;
}

/* ================= VOTE SYSTEM ================= */
function vote(){
alert("Thanks for voting! +50 coins");
coins+=50;
save();
}

/* ================= ARCADE ================= */
function mine(){
score++;
coins++;
document.getElementById("score").innerText=score;
save();
}

</script>

</body>
</html>
